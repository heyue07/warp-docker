name: Build and publish Docker image

on:
  workflow_dispatch:
    inputs:
      GOST_VERSION:
        description: "Version of gost. If empty, the latest version will be used."
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨 0:00 自动检查 (UTC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get versions
        id: vars
        run: |
          # 获取 GOST v3 最新版本 (使用 GITHUB_TOKEN 避免限速)
          if [ -z "${{ github.event.inputs.GOST_VERSION }}" ]; then
            RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/gost-net/gost/releases/latest)
            GOST_VER=$(echo "$RESPONSE" | jq -r '.tag_name' | sed 's/^v//')
            if [ "$GOST_VER" = "null" ] || [ -z "$GOST_VER" ]; then
              echo "Error: Could not fetch GOST version from API. Response was:"
              echo "$RESPONSE"
              exit 1
            fi
          else
            GOST_VER=${{ github.event.inputs.GOST_VERSION }}
          fi
          
          # 获取 WARP Client 最新版本
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          WARP_VER=$(apt-cache show cloudflare-warp | grep '^Version:' | head -n 1 | awk '{print $2}' | sed 's/-[0-9]*$//')
          
          echo "GOST_VERSION=$GOST_VER" >> $GITHUB_OUTPUT
          echo "WARP_VERSION=$WARP_VER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$WARP_VER-$GOST_VER" >> $GITHUB_OUTPUT

      - name: Log into registry ${{ secrets.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check if image exists
        id: check
        run: |
          FULL_IMAGE="${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.TAG_NAME }}"
          echo "Checking for $FULL_IMAGE..."
          
          if docker manifest inspect "$FULL_IMAGE" > /dev/null 2>&1 && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Image already exists and not a manual trigger. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Proceeding with build."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          build-args: |
            GOST_VERSION=${{ steps.vars.outputs.GOST_VERSION }}
            WARP_VERSION=${{ steps.vars.outputs.WARP_VERSION }}
            COMMIT_SHA=${{ github.sha }}
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.TAG_NAME }}
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.TAG_NAME }}-${{ github.sha }}

      - name: Build and push slim variant
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          build-args: |
            GOST_VERSION=${{ steps.vars.outputs.GOST_VERSION }}
            WARP_VERSION=${{ steps.vars.outputs.WARP_VERSION }}
            COMMIT_SHA=${{ github.sha }}
            BASE_IMAGE=debian:bookworm-slim
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:slim-latest
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:slim-${{ steps.vars.outputs.TAG_NAME }}
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:slim-${{ steps.vars.outputs.TAG_NAME }}-${{ github.sha }}
